services:
  mongodb:
    image: mongo:7
    container_name: vehicle_platform_mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-platform_user}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-change_me_in_production}
      MONGO_INITDB_DATABASE: vehicle_platform_db
    volumes:
      - vehicle_platform_mongodb_data:/data/db

volumes:
  vehicle_platform_mongodb_data: