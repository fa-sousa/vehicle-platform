apiVersion: apps/v1
kind: Deployment
metadata:
  name: vehicle-platform-mongodb
  namespace: vehicle-system
  labels:
    app: vehicle-platform-mongodb
spec:
  replicas: 1

  selector:
    matchLabels:
      app: vehicle-platform-mongodb

  template:
    metadata:
      labels:
        app: vehicle-platform-mongodb

    spec:
      containers:
        - name: mongodb
          image: mongo:7
          imagePullPolicy: IfNotPresent

          ports:
            - name: mongodb
              containerPort: 27017

          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: vehicle-platform-mongodb-secret
                  key: MONGO_INITDB_ROOT_USERNAME

            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: vehicle-platform-mongodb-secret
                  key: MONGO_INITDB_ROOT_PASSWORD

            - name: MONGO_INITDB_DATABASE
              value: vehicle_platform_db

          volumeMounts:
            - name: mongodb-storage
              mountPath: /data/db

          readinessProbe:
            exec:
              command:
                - mongosh
                - --quiet
                - --eval
                - db.adminCommand("ping")
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 10

          livenessProbe:
            exec:
              command:
                - mongosh
                - --quiet
                - --eval
                - db.adminCommand("ping")
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5

          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"

      volumes:
        - name: mongodb-storage
          persistentVolumeClaim:
            claimName: vehicle-platform-mongodb-pvc